name: Run ESLint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: ./.node-version
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
        env:
          CI: true

      - name: npm run lint
        run: |
          npm run lint
